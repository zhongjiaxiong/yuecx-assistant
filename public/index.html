<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤出行城际出行助手</title>
<style>
  :root {
    --bg: #f5f5f5;
    --chat-bg: #fff;
    --user-bubble: #07c160;
    --user-text: #fff;
    --bot-bubble: #fff;
    --bot-text: #333;
    --border: #e5e5e5;
    --input-bg: #fff;
    --shadow: rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: var(--bg); }
  #app {
    display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto;
    background: var(--chat-bg); box-shadow: 0 0 20px var(--shadow);
  }
  header {
    flex-shrink: 0; padding: 14px 16px; background: #07c160; color: #fff;
    font-size: 17px; font-weight: 600; text-align: center;
    -webkit-user-select: none; user-select: none;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: 14px; gap: 8px; animation: fadeIn .2s ease; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 16px; line-height: 1.6;
    font-size: 15px; word-break: break-word; white-space: pre-wrap; position: relative;
  }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-top-right-radius: 4px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: #e8e8e8;
  }
  .msg.user .avatar { background: #07c160; color: #fff; }
  .typing .bubble::after {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #999; border-radius: 50%; margin-left: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  #input-bar {
    flex-shrink: 0; display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border); background: #fafafa;
  }
  #input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 15px; outline: none; background: var(--input-bg); resize: none;
    min-height: 40px; max-height: 120px; line-height: 1.4;
  }
  #input:focus { border-color: #07c160; }
  #send-btn {
    flex-shrink: 0; width: 64px; border: none; border-radius: 20px;
    background: #07c160; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }
  #send-btn:active:not(:disabled) { opacity: .7; }
  .hint { text-align: center; color: #999; font-size: 12px; padding: 8px 0 4px; }
</style>
</head>
<body>
<div id="app">
  <header>粤出行城际出行助手</header>
  <div id="messages">
    <div class="hint">支持广东省内约 89 个城市的城际巴士查询</div>
  </div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="输入你的问题..." enterkeyhint="send"></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>
<script>
(function() {
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const sessionId = 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  let sending = false;

  function scrollBottom() {
    requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '我' : '🚌';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🚌';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = '思考中';
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoGrow();
    addMessage(text, 'user');
    addTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text }),
      });
      removeTyping();
      if (!resp.ok) throw new Error('服务异常');
      const data = await resp.json();
      addMessage(data.reply || '（无回复）', 'bot');
    } catch (e) {
      removeTyping();
      addMessage('网络异常，请稍后重试', 'bot');
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', autoGrow);

  addMessage('你好！我是粤出行城际出行助手。\n\n你可以告诉我你想从哪里到哪里，我来帮你找到最合适的城际巴士班次。\n\n例如："我想从广州去深圳" 或 "明天从珠海到佛山最便宜的班次"', 'bot');
})();
</script>
</body>
</html>
