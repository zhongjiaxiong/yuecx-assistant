<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤程助手</title>
<style>
  :root {
    --bg: #f5f5f5;
    --chat-bg: #fff;
    --user-bubble: #07c160;
    --user-text: #fff;
    --bot-bubble: #fff;
    --bot-text: #333;
    --border: #e5e5e5;
    --input-bg: #fff;
    --shadow: rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: var(--bg); }
  #app {
    display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto;
    background: var(--chat-bg); box-shadow: 0 0 20px var(--shadow);
  }
  header {
    flex-shrink: 0; padding: 14px 16px; background: #07c160; color: #fff;
    font-size: 17px; font-weight: 600; text-align: center;
    -webkit-user-select: none; user-select: none;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: 14px; gap: 8px; animation: fadeIn .2s ease; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 16px; line-height: 1.6;
    font-size: 15px; word-break: break-word; white-space: pre-wrap; position: relative;
  }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-top-right-radius: 4px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: #e8e8e8;
  }
  .msg.user .avatar { background: #07c160; color: #fff; }
  .typing .bubble::after {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #999; border-radius: 50%; margin-left: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  #input-bar {
    flex-shrink: 0; display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border); background: #fafafa;
  }
  #input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 15px; outline: none; background: var(--input-bg); resize: none;
    min-height: 40px; max-height: 120px; line-height: 1.4;
  }
  #input:focus { border-color: #07c160; }
  #send-btn {
    flex-shrink: 0; width: 64px; border: none; border-radius: 20px;
    background: #07c160; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }
  #send-btn:active:not(:disabled) { opacity: .7; }
  .hint { text-align: center; color: #999; font-size: 12px; padding: 8px 0 4px; }
  .booking-card {
    margin-top: 10px; border: 1px solid #e5e5e5; border-radius: 12px;
    overflow: hidden; background: #fafffe;
  }
  .booking-card-header {
    background: #07c160; color: #fff; padding: 10px 14px;
    font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .booking-card-body { padding: 12px 14px; font-size: 14px; line-height: 1.8; color: #333; }
  .booking-card-row { display: flex; gap: 6px; }
  .booking-card-label { color: #999; flex-shrink: 0; min-width: 56px; }
  .booking-card-value { color: #333; font-weight: 500; }
  .booking-card-actions { padding: 10px 14px; display: flex; gap: 8px; border-top: 1px solid #f0f0f0; }
  .booking-copy-btn {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: #07c160; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .booking-copy-btn:active { opacity: .7; }
  .booking-copy-btn.copied { background: #999; }
  .booking-guide {
    margin-top: 8px; padding: 10px 14px; background: #f8f8f8; border-radius: 8px;
    font-size: 12px; color: #666; line-height: 1.7;
  }
  .booking-guide-title { font-weight: 600; color: #333; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>粤程助手</header>
  <div id="messages">
    <div class="hint">广东省城际巴士智能查询 · 实时数据</div>
  </div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="输入你的问题..." enterkeyhint="send"></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>
<script>
(function() {
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var sessionId = 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  var sending = false;

  function scrollBottom() {
    requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }

  function renderBotContent(text) {
    var parts = text.split(/\[BOOKING_CARD:([\s\S]*?)\]/g);
    var frag = document.createDocumentFragment();
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 0) {
        if (parts[i]) {
          var span = document.createElement('span');
          span.textContent = parts[i];
          frag.appendChild(span);
        }
      } else {
        try {
          var info = JSON.parse(parts[i].trim());
          frag.appendChild(buildBookingCard(info));
        } catch(e) {
          var span2 = document.createElement('span');
          span2.textContent = parts[i];
          frag.appendChild(span2);
        }
      }
    }
    return frag;
  }

  function buildBookingCard(info) {
    var card = document.createElement('div');
    card.className = 'booking-card';

    var header = document.createElement('div');
    header.className = 'booking-card-header';
    header.textContent = '🎫 订票信息';
    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'booking-card-body';
    var rows = [
      ['路线', info.route || ''],
      ['日期', info.date || ''],
      ['班次', info.fromTime ? (info.fromTime + ' ' + (info.intervalName || '')) : (info.intervalName || '')],
      ['上车站', info.boardingStation || ''],
      ['下车站', info.dropoffStation || ''],
      ['票价', info.priceYuan ? ('¥' + info.priceYuan) : ''],
      ['余票', info.residue != null ? (info.residue + '张') : ''],
    ];
    rows.forEach(function(r) {
      if (!r[1]) return;
      var row = document.createElement('div');
      row.className = 'booking-card-row';
      var label = document.createElement('span');
      label.className = 'booking-card-label';
      label.textContent = r[0];
      var value = document.createElement('span');
      value.className = 'booking-card-value';
      value.textContent = r[1];
      row.appendChild(label);
      row.appendChild(value);
      body.appendChild(row);
    });
    card.appendChild(body);

    var actions = document.createElement('div');
    actions.className = 'booking-card-actions';
    var copyBtn = document.createElement('button');
    copyBtn.className = 'booking-copy-btn';
    copyBtn.textContent = '📋 复制订票信息';
    var copyText = [
      info.route || '', info.date || '',
      (info.fromTime || '') + ' ' + (info.intervalName || ''),
      '上车: ' + (info.boardingStation || ''),
      '下车: ' + (info.dropoffStation || ''),
      '票价: ¥' + (info.priceYuan || ''),
    ].join('\n');
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(copyText).then(function() {
        copyBtn.textContent = '✅ 已复制';
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.textContent = '📋 复制订票信息'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });
    actions.appendChild(copyBtn);
    card.appendChild(actions);

    var guide = document.createElement('div');
    guide.className = 'booking-guide';
    guide.innerHTML = '<div class="booking-guide-title">📱 如何购票</div>'
      + '1. 微信搜索「<b>粤出行城际巴士</b>」小程序<br>'
      + '2. 选择 <b>' + (info.route || '').replace('→', ' → ') + '</b><br>'
      + '3. 选择日期 <b>' + (info.date || '') + '</b><br>'
      + '4. 找到 <b>' + (info.fromTime || '') + '</b> 的班次下单';
    card.appendChild(guide);

    return card;
  }

  function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '我' : '🚌';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'bot') {
      bubble.appendChild(renderBotContent(text));
    } else {
      bubble.textContent = text;
    }
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addTyping() {
    var div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing-indicator';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🚌';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = '查询中';
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    var el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  async function send() {
    var text = inputEl.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoGrow();
    addMessage(text, 'user');
    addTyping();

    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, 90000);
      var resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sessionId, message: text }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      removeTyping();
      if (!resp.ok) throw new Error('服务异常');
      var data = await resp.json();
      addMessage(data.reply || '（无回复）', 'bot');
    } catch (e) {
      removeTyping();
      if (e.name === 'AbortError') {
        addMessage('请求超时，服务可能在启动中，请稍后再试一次', 'bot');
      } else {
        addMessage('网络异常，请稍后重试', 'bot');
      }
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', autoGrow);

  addMessage('你好！我是粤程助手。\n\n告诉我你想从哪里到哪里，我来帮你找到最合适的城际巴士班次，还可以一键生成订票链接。\n\n例如："我想从广州去深圳" 或 "明天从珠海到佛山最便宜的班次"', 'bot');

  fetch('/api/health').catch(function(){});
})();
</script>
</body>
</html>
