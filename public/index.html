<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<title>粤程助手</title>
<style>
  :root {
    --bg: #f5f5f5; --chat-bg: #fff; --green: #07c160; --green-light: #e8f8ee;
    --user-bubble: #07c160; --user-text: #fff; --bot-bubble: #fff; --bot-text: #333;
    --border: #e5e5e5; --input-bg: #fff; --shadow: rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); }
  #app {
    display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto;
    background: var(--chat-bg); box-shadow: 0 0 20px var(--shadow);
  }
  header {
    flex-shrink: 0; padding: 14px 16px; background: var(--green); color: #fff;
    font-size: 17px; font-weight: 600; text-align: center;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: 14px; gap: 8px; animation: fadeIn .2s ease; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    max-width: 82%; padding: 10px 14px; border-radius: 16px; line-height: 1.6;
    font-size: 15px; word-break: break-word; white-space: pre-wrap;
  }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-top-right-radius: 4px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px; background: #e8e8e8;
  }
  .msg.user .avatar { background: var(--green); color: #fff; }
  .typing .bubble::after {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #999; border-radius: 50%; margin-left: 4px; animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  .hint { text-align: center; color: #999; font-size: 12px; padding: 8px 0 4px; }

  /* Input Bar */
  #input-bar {
    flex-shrink: 0; display: flex; align-items: flex-end; gap: 6px; padding: 8px 10px;
    border-top: 1px solid var(--border); background: #fafafa;
  }
  .ib-toggle {
    flex-shrink: 0; width: 36px; height: 36px; border: none; border-radius: 50%;
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .ib-toggle svg { width: 24px; height: 24px; fill: #666; }
  #input {
    flex: 1; padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 15px; outline: none; background: var(--input-bg); resize: none;
    min-height: 36px; max-height: 120px; line-height: 1.4;
  }
  #input:focus { border-color: var(--green); }
  #send-btn {
    flex-shrink: 0; width: 56px; height: 36px; border: none; border-radius: 18px;
    background: var(--green); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #send-btn:disabled { opacity: .4; }

  /* Voice Button (WeChat style) */
  #voice-btn {
    flex: 1; height: 36px; border: 1px solid var(--border); border-radius: 20px;
    background: #fff; font-size: 15px; color: #333; font-weight: 500;
    cursor: pointer; display: none; user-select: none; -webkit-user-select: none;
    transition: background .1s;
  }
  #voice-btn:active, #voice-btn.pressing { background: #e0e0e0; }
  .voice-mode #input, .voice-mode #send-btn { display: none; }
  .voice-mode #voice-btn { display: block; }

  /* Recording Overlay */
  #rec-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.4); justify-content: center; align-items: center;
    flex-direction: column; gap: 16px;
  }
  #rec-overlay.active { display: flex; }
  .rec-box {
    width: 160px; height: 160px; border-radius: 20px; background: rgba(0,0,0,0.75);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .rec-box.cancel { background: rgba(220,50,50,0.85); }
  .rec-waves { display: flex; align-items: center; gap: 3px; height: 40px; }
  .rec-waves span {
    width: 4px; border-radius: 2px; background: #07c160;
    animation: wave 0.8s ease-in-out infinite alternate;
  }
  .rec-box.cancel .rec-waves span { background: #fff; }
  .rec-waves span:nth-child(1) { height: 12px; animation-delay: 0s; }
  .rec-waves span:nth-child(2) { height: 20px; animation-delay: 0.1s; }
  .rec-waves span:nth-child(3) { height: 32px; animation-delay: 0.2s; }
  .rec-waves span:nth-child(4) { height: 24px; animation-delay: 0.3s; }
  .rec-waves span:nth-child(5) { height: 16px; animation-delay: 0.4s; }
  @keyframes wave { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }
  .rec-text { color: #fff; font-size: 14px; text-align: center; }
  .rec-hint { color: rgba(255,255,255,0.7); font-size: 13px; }

  /* Route Results Card */
  .rr-wrap { margin-top: 8px; }
  .rr-item {
    margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: #fff;
  }
  .rr-item.has-warn { border-left: 3px solid #faad14; }
  .rr-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid #f5f5f5;
  }
  .rr-left { display: flex; align-items: center; gap: 8px; }
  .rr-rank {
    width: 22px; height: 22px; border-radius: 50%; background: var(--green);
    color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .rr-time { font-size: 18px; font-weight: 700; color: #222; white-space: nowrap; flex-shrink: 0; }
  .rr-price { font-size: 16px; font-weight: 600; color: #f5222d; white-space: nowrap; }
  .rr-body { padding: 6px 12px 8px; }
  .rr-station { font-size: 13px; color: #555; line-height: 1.6; word-break: break-word; }
  .rr-station-label { color: #999; margin-right: 4px; }
  .rr-dist-tag { font-size: 11px; color: var(--green); margin-left: 4px; }
  .rr-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px 8px; font-size: 12px; color: #999;
  }
  .rr-meta-left { display: flex; gap: 10px; align-items: center; }
  .rr-seats { color: #666; }
  .rr-warn { color: #faad14; font-size: 11px; }
  .rr-book-btn {
    padding: 5px 14px; border: 1px solid var(--green); border-radius: 14px;
    background: #fff; color: var(--green); font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .rr-book-btn:active { background: var(--green); color: #fff; }
  .rr-footer { font-size: 12px; color: #999; padding: 2px 0; }

  /* Booking Card */
  .bk-card { margin-top: 10px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #fafffe; }
  .bk-header { background: var(--green); color: #fff; padding: 10px 14px; font-size: 14px; font-weight: 600; }
  .bk-body { padding: 10px 14px; font-size: 13px; line-height: 1.8; color: #333; }
  .bk-row { display: flex; gap: 6px; }
  .bk-label { color: #999; flex-shrink: 0; min-width: 48px; }
  .bk-val { color: #333; font-weight: 500; }
  .bk-actions { padding: 10px 14px; border-top: 1px solid #f0f0f0; }
  .bk-copy {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    background: var(--green); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .bk-copy:active { opacity: .7; }
  .bk-copy.copied { background: #999; }
  .bk-guide { padding: 10px 14px; background: #f8f8f8; font-size: 12px; color: #666; line-height: 1.7; }
  .bk-guide b { color: #333; }

  /* Tab Navigation */
  #nav-tabs {
    flex-shrink: 0; display: flex; border-bottom: 1px solid var(--border);
    background: #fafafa;
  }
  .nav-tab {
    flex: 1; padding: 12px; text-align: center; font-size: 14px;
    color: #666; cursor: pointer; position: relative;
  }
  .nav-tab.active { color: var(--green); font-weight: 600; }
  .nav-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2px; background: var(--green); border-radius: 1px;
  }

  /* Orders Panel */
  .orders-header {
    padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .orders-title { font-size: 16px; font-weight: 600; color: #333; }
  .orders-stats { font-size: 12px; color: #999; }
  .order-filters {
    display: flex; gap: 8px; padding: 10px 16px; background: #fff;
    border-bottom: 1px solid var(--border); overflow-x: auto;
  }
  .filter-btn {
    padding: 6px 14px; border: 1px solid #ddd; border-radius: 16px;
    font-size: 13px; color: #666; background: #fff; cursor: pointer; white-space: nowrap;
  }
  .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
  .order-list { padding: 10px; }
  .order-item {
    background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .order-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;
  }
  .order-id { font-size: 12px; color: #999; }
  .order-status {
    padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
  }
  .order-status.pending { background: #fff7e6; color: #fa8c16; }
  .order-status.paid { background: #e6f7ff; color: #1890ff; }
  .order-status.completed { background: #f6ffed; color: #52c41a; }
  .order-status.cancelled { background: #f5f5f5; color: #999; }
  .order-route {
    font-size: 15px; font-weight: 600; color: #333; margin-bottom: 8px;
  }
  .order-detail { font-size: 13px; color: #666; line-height: 1.6; }
  .order-detail-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .order-label { color: #999; min-width: 48px; }
  .order-value { color: #333; }
  .order-price { color: #f5222d; font-weight: 600; }
  .order-actions {
    display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #f0f0f0;
  }
  .order-btn {
    flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 13px; text-align: center; cursor: pointer; background: #fff;
  }
  .order-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
  .order-btn.danger { color: #ff4d4f; border-color: #ff4d4f; }
  .order-btn.stripe { background: #635bff; color: #fff; border-color: #635bff; }
  .order-btn:disabled { opacity: .5; cursor: not-allowed; }
  .empty-orders {
    text-align: center; padding: 60px 20px; color: #999;
  }
  .empty-orders-icon { font-size: 48px; margin-bottom: 12px; }
  .loading-orders {
    text-align: center; padding: 40px; color: #999;
  }

  /* Location button in input bar */
  #loc-btn {
    flex-shrink: 0; width: 36px; height: 36px; border: none; border-radius: 50%;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #loc-btn svg { width: 22px; height: 22px; fill: #999; }
  #loc-btn.active svg { fill: var(--green); }

  /* Map Overlay */
  #map-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: #fff; flex-direction: column;
  }
  #map-overlay.open { display: flex; }
  .map-header {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--green); color: #fff;
  }
  .map-header-title { font-size: 16px; font-weight: 600; }
  .map-close {
    width: 32px; height: 32px; border: none; border-radius: 50%;
    background: rgba(255,255,255,0.2); color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #map-container { flex: 1; }
  .map-stations {
    flex-shrink: 0; max-height: 40vh; overflow-y: auto; background: #fff;
    border-top: 1px solid var(--border);
  }
  .map-st-item {
    display: flex; align-items: center; padding: 12px 16px; gap: 12px;
    border-bottom: 1px solid #f5f5f5; cursor: pointer;
  }
  .map-st-item:active { background: #f9f9f9; }
  .map-st-rank {
    width: 24px; height: 24px; border-radius: 50%; background: var(--green);
    color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .map-st-info { flex: 1; min-width: 0; }
  .map-st-name { font-size: 14px; font-weight: 600; color: #333; }
  .map-st-meta { font-size: 12px; color: #999; margin-top: 2px; }
  .map-st-dist {
    font-size: 13px; font-weight: 600; color: var(--green); flex-shrink: 0; white-space: nowrap;
  }
  .map-st-select {
    padding: 5px 12px; border: 1px solid var(--green); border-radius: 14px;
    background: #fff; color: var(--green); font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  }
  .map-st-select:active { background: var(--green); color: #fff; }
  .map-loading { text-align: center; padding: 30px; color: #999; font-size: 14px; }
  .map-empty { text-align: center; padding: 30px; color: #999; }
  .map-loc-hint {
    padding: 8px 16px; background: #fffbe6; font-size: 12px; color: #ad8b00; text-align: center;
  }
</style>
</head>
<body>
<div id="app">
  <header>粤程助手 · 聚合比价</header>

  <!-- Tab Navigation -->
  <div id="nav-tabs">
    <div class="nav-tab active" data-tab="chat">💬 智能助手</div>
    <div class="nav-tab" data-tab="orders">🎫 我的订单</div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
    <div id="messages">
      <div class="hint">广东省城际巴士聚合平台 · 多源比价 · 实时数据</div>
    </div>
    <div id="input-bar">
    <button class="ib-toggle" id="mode-toggle" title="切换语音/文字">
      <svg id="icon-mic" viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.93V20H8v2h8v-2h-3v-2.07A7 7 0 0019 11h-2z"/></svg>
      <svg id="icon-kbd" style="display:none" viewBox="0 0 24 24"><path d="M20 5H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 12H4V7h16v10zM6 10h2v2H6v-2zm0 4h8v2H6v-2zm10 0h2v2h-2v-2zm0-4h2v2h-2v-2zm-4 0h2v2h-2v-2z"/></svg>
    </button>
    <button id="loc-btn" title="定位推荐上车点">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
    </button>
    <textarea id="input" rows="1" placeholder="输入你的问题..." enterkeyhint="send"></textarea>
    <button id="voice-btn">按住 说话</button>
    <button id="send-btn">发送</button>
  </div>
  </div>

  <!-- Orders Panel -->
  <div id="orders-panel" style="display: none; flex: 1; overflow-y: auto; background: #f5f5f5;">
    <div class="orders-header">
      <div class="orders-title">我的订单</div>
      <div class="orders-stats" id="orders-stats"></div>
    </div>
    <div class="order-filters">
      <button class="filter-btn active" data-status="">全部</button>
      <button class="filter-btn" data-status="pending">待支付</button>
      <button class="filter-btn" data-status="paid">已支付</button>
      <button class="filter-btn" data-status="completed">已完成</button>
      <button class="filter-btn" data-status="cancelled">已取消</button>
    </div>
    <div class="order-list" id="order-list">
      <div class="loading-orders">点击「我的订单」标签加载</div>
    </div>
  </div>
</div>

<div id="map-overlay">
  <div class="map-header">
    <span class="map-header-title">📍 附近上车站</span>
    <button class="map-close" id="map-close">✕</button>
  </div>
  <div id="map-container"></div>
  <div class="map-stations" id="map-stations">
    <div class="map-loading">获取定位中...</div>
  </div>
</div>

<div id="rec-overlay">
  <div class="rec-box" id="rec-box">
    <div class="rec-waves"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="rec-text" id="rec-text">正在录音...</div>
  </div>
  <div class="rec-hint" id="rec-hint">↑ 上滑取消</div>
</div>

<script>
(function() {
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var modeToggle = document.getElementById('mode-toggle');
  var iconMic = document.getElementById('icon-mic');
  var iconKbd = document.getElementById('icon-kbd');
  var voiceBtn = document.getElementById('voice-btn');
  var inputBar = document.getElementById('input-bar');
  var recOverlay = document.getElementById('rec-overlay');
  var recBox = document.getElementById('rec-box');
  var recText = document.getElementById('rec-text');
  var recHint = document.getElementById('rec-hint');

  var sessionId = 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  var sending = false;
  var voiceMode = false;
  var userLocation = null;

  // --- Mode Toggle ---
  modeToggle.addEventListener('click', function() {
    voiceMode = !voiceMode;
    if (voiceMode) {
      inputBar.classList.add('voice-mode');
      iconMic.style.display = 'none';
      iconKbd.style.display = '';
    } else {
      inputBar.classList.remove('voice-mode');
      iconMic.style.display = '';
      iconKbd.style.display = 'none';
      inputEl.focus();
    }
  });

  // --- Voice Recording (press & hold) ---
  var mediaRecorder = null;
  var audioChunks = [];
  var recStartY = 0;
  var cancelled = false;

  function startRec(startY) {
    recStartY = startY;
    cancelled = false;
    audioChunks = [];
    recBox.classList.remove('cancel');
    recText.textContent = '正在录音...';
    recHint.textContent = '↑ 上滑取消';
    recOverlay.classList.add('active');
    voiceBtn.classList.add('pressing');

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : {});
      mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = function() {
        stream.getTracks().forEach(function(t) { t.stop(); });
        if (!cancelled && audioChunks.length > 0) {
          var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          handleVoiceBlob(blob);
        }
      };
      mediaRecorder.start();
    }).catch(function(err) {
      console.error('Mic access denied:', err);
      recOverlay.classList.remove('active');
      voiceBtn.classList.remove('pressing');
      addMessage('无法访问麦克风，请在浏览器设置中允许', 'bot');
    });
  }

  function moveRec(currentY) {
    var diff = recStartY - currentY;
    if (diff > 60) {
      recBox.classList.add('cancel');
      recText.textContent = '松开取消';
      recHint.textContent = '';
      cancelled = true;
    } else {
      recBox.classList.remove('cancel');
      recText.textContent = '正在录音...';
      recHint.textContent = '↑ 上滑取消';
      cancelled = false;
    }
  }

  function stopRec() {
    recOverlay.classList.remove('active');
    voiceBtn.classList.remove('pressing');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
  }

  // Touch events
  voiceBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    startRec(e.touches[0].clientY);
  }, { passive: false });
  voiceBtn.addEventListener('touchmove', function(e) {
    e.preventDefault();
    moveRec(e.touches[0].clientY);
  }, { passive: false });
  voiceBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopRec(); });
  voiceBtn.addEventListener('touchcancel', function(e) { cancelled = true; stopRec(); });

  // Mouse events (for desktop testing)
  voiceBtn.addEventListener('mousedown', function(e) { startRec(e.clientY); });
  document.addEventListener('mousemove', function(e) { if (mediaRecorder && mediaRecorder.state === 'recording') moveRec(e.clientY); });
  document.addEventListener('mouseup', function() { if (mediaRecorder && mediaRecorder.state === 'recording') stopRec(); });

  async function handleVoiceBlob(blob) {
    addTyping();
    var form = new FormData();

  function renderBotContent(text) {
    var frag = document.createDocumentFragment();
    var tags = ['ROUTE_RESULTS', 'BOOKING_CARD'];
    var pos = 0;
    while (pos < text.length) {
      var best = null;
      for (var i = 0; i < tags.length; i++) {
        var pfx = '[' + tags[i] + ':';
        var idx = text.indexOf(pfx, pos);
        if (idx !== -1 && (!best || idx < best.idx)) best = { tag: tags[i], idx: idx, pfx: pfx };
      }
      if (!best) { var sp = document.createElement('span'); sp.textContent = text.slice(pos); frag.appendChild(sp); break; }
      if (best.idx > pos) { var sp2 = document.createElement('span'); sp2.textContent = text.slice(pos, best.idx); frag.appendChild(sp2); }
      var jStart = best.idx + best.pfx.length;
      var depth = 0, jEnd = -1;
      for (var j = jStart; j < text.length; j++) {
        if (text[j] === '{') depth++;
        else if (text[j] === '}') { depth--; if (depth === 0) { jEnd = j + 1; break; } }
      }
      if (jEnd > 0) {
        try {
          var d = JSON.parse(text.slice(jStart, jEnd));
          frag.appendChild(best.tag === 'ROUTE_RESULTS' ? buildRouteResults(d) : buildBookingCard(d));
          pos = jEnd; if (pos < text.length && text[pos] === ']') pos++;
        } catch(e) {
          var sf = document.createElement('span'); sf.textContent = text.slice(best.idx, jEnd); frag.appendChild(sf); pos = jEnd;
        }
      } else {
        var sr = document.createElement('span'); sr.textContent = text.slice(best.idx); frag.appendChild(sr); break;
      }
    }
    return frag;
  }

  function fmtDist(d) {
    if (!d) return '';
    var s = String(d);
    if (s.indexOf('km') !== -1 || s.indexOf('m') !== -1) return s;
    var n = parseFloat(s);
    if (isNaN(n)) return s;
    return n < 1 ? Math.round(n * 1000) + 'm' : n.toFixed(1) + 'km';
  }

  async function doChat(text) {
    var typDiv = document.createElement('div'); typDiv.className = 'msg bot typing'; typDiv.id = 'chat-typing';
    typDiv.innerHTML = '<div class="avatar">🚌</div><div class="bubble">思考中</div>';
    messagesEl.appendChild(typDiv); scrollBottom();

    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, 95000);
      var payload = { sessionId: sessionId, message: text };
      if (userLocation) payload.location = userLocation;
      var resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify(payload),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('fail');

      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      var finalReply = '';
      var gotDone = false;

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        for (var li = 0; li < lines.length; li++) {
          var line = lines[li];
          if (line.indexOf('data: ') !== 0) continue;
          try {
            var evt = JSON.parse(line.slice(6));
            if (evt.type === 'progress') {
              updateTypingStep(evt.step);
            } else if (evt.type === 'done') {
              finalReply = evt.reply || '';
              gotDone = true;
            } else if (evt.type === 'error') {
              finalReply = '';
              gotDone = true;
              var ct0 = document.getElementById('chat-typing'); if (ct0) ct0.remove();
              addMessage(evt.error || '服务异常', 'bot');
              return;
            }
          } catch(pe) {}
        }
      }

      var ct = document.getElementById('chat-typing'); if (ct) ct.remove();
      if (gotDone) {
        addMessage(finalReply || '（无回复）', 'bot');
      } else {
        addMessage('（无回复）', 'bot');
      }
    } catch(e) {
      var ct2 = document.getElementById('chat-typing'); if (ct2) ct2.remove();
      addMessage(e.name === 'AbortError' ? '请求超时，服务启动中，请再试一次' : '网络异常，请稍后重试', 'bot');
    }
  }

    if (action === 'cancel') {
      if (!confirm('确定要取消订单 ' + orderId + ' 吗？')) return;

          method: 'POST',

        if (result.success) {
          alert('订单已取消');
          loadOrders();
        } else {
          alert('取消失败: ' + (result.error || '未知错误'));

      } catch (err) {
        alert('取消失败: ' + err.message);
      }

      var payMethod = confirm('💳 点击"确定"使用 Stripe 支付 (支持支付宝/微信/信用卡)\n\n点击"取消"查看小程序支付指引');

      if (payMethod) {
        try {
          e.target.textContent = '⏳ 跳转中...';
          e.target.disabled = true;

          var resp = await fetch('/api/orders/' + orderId + '/pay', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          var result = await resp.json();

          if (result.success && result.url) {
            window.location.href = result.url;
          } else {
            alert('支付创建失败: ' + (result.error || '未知错误'));
            e.target.textContent = '去支付';
            e.target.disabled = false;
          }
        } catch (err) {
          alert('支付创建失败: ' + err.message);
          e.target.textContent = '去支付';
          e.target.disabled = false;
        }
      } else {
        alert('🎫 小程序支付指引:\n\n1. 微信搜索「粤出行城际巴士」或「如约城际巴士」\n2. 进入订单页面\n3. 找到订单完成支付');
      }
    } else if (action === 'detail' || action === 'ticket') {
      try {
        var resp = await fetch('/api/orders/' + orderId);
        var result = await resp.json();

        if (result.success) {
          var detail = result.data;
          var info = [
            '订单号: ' + detail.orderId,
            '状态: ' + (STATUS_TEXT[detail.status] || detail.statusText),
            '路线: ' + (detail.startCity + ' → ' + detail.endCity),
            '日期: ' + detail.date,
            '时间: ' + (detail.fromTime || '未指定'),
            '上车站: ' + (detail.boardingStation || '未指定'),
            '下车站: ' + (detail.dropoffStation || '未指定'),
            '票价: ¥' + detail.priceYuan,
            '来源: ' + (detail.source === 'yuecx' ? '粤出行' : '如约城际'),
            '创建时间: ' + new Date(detail.createdAt).toLocaleString(),
          ].join('\n');

          if (detail.miniapp && detail.miniapp.path) {
            info += '\n\n小程序路径: ' + detail.miniapp.path;
          }

          alert(info);
        }
      } catch (err) {
        alert('获取详情失败: ' + err.message);
      }
    }
  }

  // ── 处理支付回调 ─────────────────────────────────────────
  (function handlePaymentCallback() {
    var urlParams = new URLSearchParams(window.location.search);
    var payment = urlParams.get('payment');
    var orderId = urlParams.get('orderId');

    if (payment === 'success') {
      addMessage('✅ 支付成功！订单号: ' + (orderId || '') + '\n\n感谢您的购买，订单已确认。', 'bot');
      window.history.replaceState({}, '', '/');
    } else if (payment === 'cancelled') {
      addMessage('⚠️ 支付已取消。订单 ' + (orderId || '') + ' 仍保留，您可以稍后重新支付。', 'bot');
      window.history.replaceState({}, '', '/');
    } else if (payment === 'error') {
      var message = urlParams.get('message') || '未知错误';
      addMessage('❌ 支付处理失败: ' + decodeURIComponent(message) + '\n\n请稍后重试或联系客服。', 'bot');
      window.history.replaceState({}, '', '/');
    } else if (payment === 'pending') {
      addMessage('⏳ 支付处理中，订单号: ' + (orderId || '') + '\n\n请稍等片刻，系统正在确认支付状态。', 'bot');
      window.history.replaceState({}, '', '/');
    }
  })();
})();
</script>
