<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤程助手</title>
<style>
  :root {
    --bg: #f5f5f5;
    --chat-bg: #fff;
    --user-bubble: #07c160;
    --user-text: #fff;
    --bot-bubble: #fff;
    --bot-text: #333;
    --border: #e5e5e5;
    --input-bg: #fff;
    --shadow: rgba(0,0,0,0.06);
    --green: #07c160;
    --green-light: #e8f8ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: var(--bg); }
  #app {
    display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto;
    background: var(--chat-bg); box-shadow: 0 0 20px var(--shadow);
  }
  header {
    flex-shrink: 0; padding: 14px 16px; background: var(--green); color: #fff;
    font-size: 17px; font-weight: 600; text-align: center;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: 14px; gap: 8px; animation: fadeIn .2s ease; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    max-width: 82%; padding: 10px 14px; border-radius: 16px; line-height: 1.6;
    font-size: 15px; word-break: break-word; white-space: pre-wrap; position: relative;
  }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-top-right-radius: 4px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: #e8e8e8;
  }
  .msg.user .avatar { background: var(--green); color: #fff; }
  .typing .bubble::after {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #999; border-radius: 50%; margin-left: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  #input-bar {
    flex-shrink: 0; display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border); background: #fafafa;
  }
  #input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 15px; outline: none; background: var(--input-bg); resize: none;
    min-height: 40px; max-height: 120px; line-height: 1.4;
  }
  #input:focus { border-color: var(--green); }
  #send-btn {
    flex-shrink: 0; width: 64px; border: none; border-radius: 20px;
    background: var(--green); color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }
  #send-btn:active:not(:disabled) { opacity: .7; }

  /* Mic (voice input) button */
  #mic-btn {
    flex-shrink: 0; width: 40px; height: 40px; border: none; border-radius: 50%;
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: background .15s; position: relative;
  }
  #mic-btn:hover { background: #f0f0f0; }
  #mic-btn svg { width: 22px; height: 22px; fill: #666; transition: fill .15s; }
  #mic-btn.recording { background: #fde8e8; }
  #mic-btn.recording svg { fill: #e53935; }
  #mic-btn.recording::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid #e53935; animation: mic-pulse 1.2s ease-out infinite;
  }
  #mic-btn.unsupported { display: none; }
  @keyframes mic-pulse { 0% { opacity: .8; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }

  .hint { text-align: center; color: #999; font-size: 12px; padding: 8px 0 4px; }

  /* Route Results Card */
  .rr-wrap { margin-top: 8px; }
  .rr-item {
    display: flex; align-items: stretch; gap: 0; margin-bottom: 8px;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    background: #fff; cursor: pointer; transition: border-color .15s;
  }
  .rr-item:active { border-color: var(--green); }
  .rr-item.has-warn { border-left: 3px solid #faad14; }
  .rr-rank {
    display: flex; align-items: center; justify-content: center;
    width: 32px; flex-shrink: 0; background: var(--green-light);
    font-size: 14px; font-weight: 700; color: var(--green);
  }
  .rr-body { flex: 1; padding: 8px 10px; min-width: 0; }
  .rr-top { display: flex; align-items: baseline; gap: 6px; }
  .rr-time { font-size: 18px; font-weight: 700; color: #222; }
  .rr-route { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rr-bottom { display: flex; align-items: center; gap: 8px; margin-top: 3px; font-size: 12px; color: #666; }
  .rr-price { font-weight: 600; color: #f5222d; }
  .rr-seats { color: #999; }
  .rr-warn { color: #faad14; font-size: 11px; }
  .rr-right {
    display: flex; align-items: center; padding: 0 10px; flex-shrink: 0;
  }
  .rr-book-btn {
    padding: 6px 10px; border: 1px solid var(--green); border-radius: 14px;
    background: #fff; color: var(--green); font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .rr-book-btn:active { background: var(--green); color: #fff; }
  .rr-footer { font-size: 12px; color: #999; padding: 2px 0; }

  /* Booking Card */
  .bk-card {
    margin-top: 10px; border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; background: #fafffe;
  }
  .bk-header {
    background: var(--green); color: #fff; padding: 10px 14px;
    font-size: 14px; font-weight: 600;
  }
  .bk-body { padding: 10px 14px; font-size: 13px; line-height: 1.8; color: #333; }
  .bk-row { display: flex; gap: 6px; }
  .bk-label { color: #999; flex-shrink: 0; min-width: 48px; }
  .bk-val { color: #333; font-weight: 500; }
  .bk-actions { padding: 10px 14px; border-top: 1px solid #f0f0f0; }
  .bk-copy {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    background: var(--green); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .bk-copy:active { opacity: .7; }
  .bk-copy.copied { background: #999; }
  .bk-guide {
    padding: 10px 14px; background: #f8f8f8; font-size: 12px; color: #666; line-height: 1.7;
  }
  .bk-guide b { color: #333; }
</style>
</head>
<body>
<div id="app">
  <header>粤程助手</header>
  <div id="messages">
    <div class="hint">广东省城际巴士智能查询 · 实时数据</div>
  </div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="输入你的问题..." enterkeyhint="send"></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>
<script>
(function() {
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var sessionId = 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  var sending = false;

  function scrollBottom() {
    requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }

  function esc(s) { var d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

  function shortenStation(name) {
    if (!name) return '';
    return name
      .replace(/\(.*?\)/g, '').replace(/（.*?）/g, '')
      .replace(/地铁站[A-Z]?\d*口?/g, '站')
      .replace(/公交站/g, '站')
      .replace(/旁边|路边|前面|出来|左转/g, '')
      .trim();
  }

  function renderBotContent(text) {
    var frag = document.createDocumentFragment();
    var re = /\[(ROUTE_RESULTS|BOOKING_CARD):([\s\S]*?)\]/g;
    var last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) {
        var span = document.createElement('span');
        span.textContent = text.slice(last, m.index);
        frag.appendChild(span);
      }
      try {
        var data = JSON.parse(m[2].trim());
        if (m[1] === 'ROUTE_RESULTS') frag.appendChild(buildRouteResults(data));
        else frag.appendChild(buildBookingCard(data));
      } catch(e) {
        var s2 = document.createElement('span');
        s2.textContent = m[0];
        frag.appendChild(s2);
      }
      last = re.lastIndex;
    }
    if (last < text.length) {
      var tail = document.createElement('span');
      tail.textContent = text.slice(last);
      frag.appendChild(tail);
    }
    return frag;
  }

  function buildRouteResults(data) {
    var items = data.items || data;
    if (!Array.isArray(items)) return document.createTextNode('');
    var wrap = document.createElement('div');
    wrap.className = 'rr-wrap';
    items.forEach(function(it, idx) {
      var el = document.createElement('div');
      el.className = 'rr-item' + (it.warn ? ' has-warn' : '');

      var rank = document.createElement('div');
      rank.className = 'rr-rank';
      rank.textContent = idx + 1;

      var body = document.createElement('div');
      body.className = 'rr-body';

      var top = document.createElement('div');
      top.className = 'rr-top';
      var time = document.createElement('span');
      time.className = 'rr-time';
      time.textContent = it.time || '';
      var route = document.createElement('span');
      route.className = 'rr-route';
      route.textContent = shortenStation(it.boarding) + ' → ' + shortenStation(it.dropoff);
      top.appendChild(time);
      top.appendChild(route);

      var bot = document.createElement('div');
      bot.className = 'rr-bottom';
      var price = document.createElement('span');
      price.className = 'rr-price';
      price.textContent = '¥' + (it.price || '');
      var seats = document.createElement('span');
      seats.className = 'rr-seats';
      seats.textContent = '余' + (it.seats != null ? it.seats : '?') + '座';
      bot.appendChild(price);
      bot.appendChild(seats);
      if (it.warn) {
        var warn = document.createElement('span');
        warn.className = 'rr-warn';
        warn.textContent = '⚠ ' + it.warn;
        bot.appendChild(warn);
      }

      body.appendChild(top);
      body.appendChild(bot);

      var right = document.createElement('div');
      right.className = 'rr-right';
      var btn = document.createElement('button');
      btn.className = 'rr-book-btn';
      btn.textContent = '订票';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        inputEl.value = '订第' + (idx + 1) + '班';
        send();
      });
      right.appendChild(btn);

      el.appendChild(rank);
      el.appendChild(body);
      el.appendChild(right);
      wrap.appendChild(el);
    });
    if (data.tip) {
      var footer = document.createElement('div');
      footer.className = 'rr-footer';
      footer.textContent = data.tip;
      wrap.appendChild(footer);
    }
    return wrap;
  }

  function buildBookingCard(info) {
    var card = document.createElement('div');
    card.className = 'bk-card';

    var header = document.createElement('div');
    header.className = 'bk-header';
    header.textContent = '🎫 订票信息';
    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'bk-body';
    [
      ['路线', info.route], ['日期', info.date],
      ['上车', (info.boardingTime || info.fromTime || '') + ' ' + (info.boardingStation || '')],
      ['下车', info.dropoffStation], ['票价', info.priceYuan ? '¥' + info.priceYuan : ''],
      ['余票', info.residue != null ? info.residue + '张' : ''],
    ].forEach(function(r) {
      if (!r[1]) return;
      var row = document.createElement('div');
      row.className = 'bk-row';
      row.innerHTML = '<span class="bk-label">' + esc(r[0]) + '</span><span class="bk-val">' + esc(r[1]) + '</span>';
      body.appendChild(row);
    });
    card.appendChild(body);

    var actions = document.createElement('div');
    actions.className = 'bk-actions';
    var copyBtn = document.createElement('button');
    copyBtn.className = 'bk-copy';
    copyBtn.textContent = '📋 复制订票信息';
    var copyText = [info.route, info.date, (info.boardingTime||info.fromTime||'')+' '+(info.boardingStation||''), '下车: '+(info.dropoffStation||''), '票价: ¥'+(info.priceYuan||'')].join('\n');
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(copyText).then(function() {
        copyBtn.textContent = '✅ 已复制';
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.textContent = '📋 复制订票信息'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });
    actions.appendChild(copyBtn);
    card.appendChild(actions);

    var guide = document.createElement('div');
    guide.className = 'bk-guide';
    guide.innerHTML = '📱 微信搜「<b>粤出行城际巴士</b>」→ <b>' + esc((info.route||'').replace('→',' → ')) + '</b> → <b>' + esc(info.date||'') + '</b> → 找到 <b>' + esc(info.fromTime||'') + '</b> 班次下单';
    card.appendChild(guide);

    return card;
  }

  function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '我' : '🚌';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'bot') {
      bubble.appendChild(renderBotContent(text));
    } else {
      bubble.textContent = text;
    }
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addTyping() {
    var div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing-indicator';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🚌';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = '查询中';
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    var el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  async function send() {
    var text = inputEl.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoGrow();
    addMessage(text, 'user');
    addTyping();

    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, 90000);
      var resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sessionId, message: text }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      removeTyping();
      if (!resp.ok) throw new Error('服务异常');
      var data = await resp.json();
      addMessage(data.reply || '（无回复）', 'bot');
    } catch (e) {
      removeTyping();
      if (e.name === 'AbortError') {
        addMessage('请求超时，服务可能在启动中，请稍后再试一次', 'bot');
      } else {
        addMessage('网络异常，请稍后重试', 'bot');
      }
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', autoGrow);

  addMessage('你好！我是粤程助手 🚌\n\n告诉我从哪到哪、哪天走，帮你找最合适的班次。\n\n例如："明天从深圳南山去广州天河"', 'bot');

  fetch('/api/health').catch(function(){});
})();
</script>
</body>
</html>
