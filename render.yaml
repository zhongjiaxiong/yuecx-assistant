services:
  - type: web
    name: yuecx-assistant
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yuecx-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false  # 在 Dashboard 中设置生产密钥
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # 在 Dashboard 中设置
      - key: HOST_URL
        value: https://yuecx-assistant.onrender.com  # 部署后更新为实际域名
      - key: LLM_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: LLM_API_KEY
        sync: false  # 在 Dashboard 中设置
      - key: LLM_MODEL
        value: qwen-max
      - key: JWT_SECRET
        sync: false  # 在 Dashboard 中设置
      - key: AMAP_KEY
        sync: false  # 在 Dashboard 中设置（高德 Web 服务 Key，可选）
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render 默认端口
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: yuecx-db
    databaseName: yuecx
    plan: starter
    postgresMajorVersion: 15
