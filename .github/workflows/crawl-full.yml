name: Crawl Full Network

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = Beijing 02:00
  workflow_dispatch:

jobs:
  sync-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: yuecx
      - name: Sync cities and routes metadata
        working-directory: yuecx
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node crawler.js --mode meta

  crawl-chunk:
    needs: sync-meta
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        chunk: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: yuecx
      - name: Crawl chunk ${{ matrix.chunk }}
        working-directory: yuecx
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node crawler.js --mode full --days 7 --chunk ${{ matrix.chunk }} --total-chunks 4
