name: Crawl Hot Routes

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  crawl-hot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: yuecx
      - name: Run hot crawl
        working-directory: yuecx
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node crawler.js --mode hot
